name: Build and Deploy (LiaScript self-hosted viewer)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Generate LiaScript courses
        run: node scripts/convert_to_liascript.js

      - name: Run tests
        run: npm test

      - name: Assemble site bundle
        run: |
          rm -rf dist
          mkdir -p dist
          cp -r liascript_courses dist/
          cp -r viewer dist/
          cp index.html dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # One-time cleanup: removes the legacy gh-pages branch left over from the old
  # branch-based deployment. This job is idempotent and can be removed from the
  # workflow once the branch has been confirmed deleted.
  cleanup:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete gh-pages branch if it exists
        run: |
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git push origin --delete gh-pages
            echo "Deleted gh-pages branch"
          else
            echo "gh-pages branch does not exist, nothing to delete"
          fi
